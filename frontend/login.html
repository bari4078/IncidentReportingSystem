<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/auth-guard.js"></script>
    <title>Incident Reporting System - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Raleway', sans-serif;
        }

        .login-container {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #16213e 0%, #0f3460 100%);
            padding: 20px;
        }

        .login-box {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 480px;
            background: rgba(26, 26, 46, 0.95);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .login-form-section {
            padding: 50px 45px;
            color: white;
            text-align: center;
        }

        .form-title {
            font-size: 30px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(to right, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .form-subtitle {
            font-size: 14px;
            opacity: 0.6;
            margin-bottom: 35px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 10px;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 700;
        }

        .form-group input {
            width: 100%;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .form-group input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #f5a962 0%, #f19035 100%);
            border: none;
            border-radius: 12px;
            color: #172e50;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 10px 15px -3px rgba(245, 169, 98, 0.3);
        }

        .login-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(245, 169, 98, 0.4);
            filter: brightness(1.05);
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 13px;
        }

        .remember-forgot a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            color: rgba(255, 255, 255, 0.6);
        }

        .error-message {
            display: none;
            background: rgba(248, 113, 113, 0.1);
            border: 1px solid rgba(248, 113, 113, 0.2);
            padding: 14px;
            border-radius: 12px;
            color: #fca5a5;
            font-size: 14px;
            margin-bottom: 25px;
            text-align: left;
        }

        .error-message.show { display: block; }

        @media (max-width: 480px) {
            .login-form-section { padding: 40px 25px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-form-section">
                <div class="form-title">Safety Portal</div>
                <div class="form-subtitle">BUET Incident Reporting</div>

                <form id="loginForm">
                    <div class="error-message" id="errorMessage"></div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="your.email@buet.ac.bd" required autocomplete="email" />
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
                    </div>

                    <div class="remember-forgot">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="remember" />
                            <label for="remember" style="margin: 0; cursor: pointer;">Remember me</label>
                        </div>
                        <a href="forgot-password.html">Forgot password?</a>
                    </div>

                    <button type="submit" class="login-btn" id="loginBtn">Login Now</button>
                </form>

                <div style="text-align: center; margin-top: 35px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 25px;">
                    <span style="color: rgba(255,255,255,0.4); font-size: 14px;">New to the portal?</span>
                    <a href="register.html" style="color: #f5a962; text-decoration: none; font-weight: 700; margin-left: 8px; font-size: 14px;">Create Account</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');

        // Use relative path to support both direct file access and server serving
        const API_URL = '/api';
        // helper for attaching auth token if available (not used for login but convenient later)
        function getHeaders(extra = {}) {
            const headers = { 'Content-Type': 'application/json', ...extra };
            const token = localStorage.getItem('token');
            if (token) headers['Authorization'] = 'Bearer ' + token;
            return headers;
        }

        async function apiFetch(path, opts = {}) {
            const options = { ...opts };
            options.headers = getHeaders(options.headers);
            return fetch(`${API_URL}${path}`, options);
        }

        // Valid domains
        const VALID_DOMAINS = ['@buet.ac.bd', '@ugrad.buet.ac.bd', '@cse.buet.ac.bd', '@dmp.bd'];

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            emailInput.classList.add('error');
            passwordInput.classList.add('error');
            setTimeout(() => {
                errorMessage.classList.remove('show');
                emailInput.classList.remove('error');
                passwordInput.classList.remove('error');
            }, 5000);
        }

        function validateEmail(email) {
            const hasValidDomain = VALID_DOMAINS.some(domain => email.endsWith(domain));
            if (!hasValidDomain) {
                showError(`Invalid email domain. Please use ${VALID_DOMAINS.join(', ')}`);
                return false;
            }
            return true;
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            // Validate email domain
            if (!validateEmail(email)) {
                return;
            }

            if (!password) {
                showError('Please enter your password');
                return;
            }

            loginBtn.disabled = true;

            try {
                const response = await apiFetch('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    showError(data.error || 'Invalid email or password');
                    loginBtn.disabled = false;
                    return;
                }

                // Store user info
                const user = data.user;
                localStorage.setItem('user', JSON.stringify(user));
                localStorage.setItem('token', data.token);

                // Redirect to dashboard
                window.location.href = 'index.html';
            } catch (err) {
                console.error('Login error:', err);
                showError('Network error. Are you sure the server is running on localhost:3000?');
                loginBtn.disabled = false;
            }
        });

        // Remove error styling on input
        emailInput.addEventListener('input', () => {
            emailInput.classList.remove('error');
        });
        passwordInput.addEventListener('input', () => {
            passwordInput.classList.remove('error');
        });

        // Check if already logged in
        window.addEventListener('load', () => {
            const user = localStorage.getItem('user');
            if (user) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
