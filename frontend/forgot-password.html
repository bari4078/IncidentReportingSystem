<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Reporting System - Reset Password</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; font-family: 'Raleway', sans-serif; }
        
        .login-container {
            width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #2d3561 0%, #3d4575 100%);
        }

        .login-box {
            display: grid; grid-template-columns: 1fr 1fr; width: 90%; max-width: 1000px;
            height: auto; min-height: 500px; border-radius: 16px; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-form-section {
            background: linear-gradient(135deg, #2d3561 0%, #3d4575 100%);
            padding: 50px 40px; display: flex; flex-direction: column; justify-content: center;
            color: white;
        }

        .login-image-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-size: cover; background-position: center; position: relative; overflow: hidden;
        }

        .form-title { font-size: 28px; font-weight: 600; margin-bottom: 10px; text-align: left; }
        .form-subtitle { font-size: 14px; opacity: 0.9; margin-bottom: 30px; text-align: left; }

        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 6px; opacity: 0.9;
        }
        .form-group input {
            width: 100%; padding: 12px 14px; border: none; border-radius: 6px;
            background: rgba(255, 255, 255, 0.15); color: white; font-family: 'Raleway', sans-serif;
            font-size: 14px; transition: all 0.3s; text-align: center; letter-spacing: 2px;
        }
        .form-group input.normal-text { text-align: left; letter-spacing: normal; }
        .form-group input::placeholder { color: rgba(255, 255, 255, 0.6); }
        .form-group input:focus {
            outline: none; background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 0 2px rgba(102, 126, 234, 0.4);
        }

        .login-btn {
            width: 100%; padding: 14px; background: #f5a962; border: none; border-radius: 6px;
            color: #2d3561; font-weight: 600; font-size: 16px; cursor: pointer; transition: all 0.3s;
            font-family: 'Raleway', sans-serif; margin-top: 10px;
        }
        .login-btn:hover:not(:disabled) {
            background: #f59e51; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(245, 169, 98, 0.3);
        }
        .login-btn:disabled { opacity: 0.7; cursor: not-allowed; }

        .secondary-btn {
            width: 100%; padding: 14px; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 6px;
            color: white; font-weight: 600; font-size: 16px; cursor: pointer; transition: all 0.3s;
            font-family: 'Raleway', sans-serif; margin-top: 10px;
        }
        .secondary-btn:hover:not(:disabled) { background: rgba(255,255,255,0.25); }

        .error-message {
            display: none; background: rgba(248, 113, 113, 0.15); border-left: 4px solid #f87171;
            padding: 12px 16px; border-radius: 6px; color: #fca5a5; font-size: 13px; margin-bottom: 15px;
        }
        .error-message.show { display: block; }

        .success-message {
            display: none; background: rgba(16, 185, 129, 0.15); border-left: 4px solid #10b981;
            padding: 12px 16px; border-radius: 6px; color: #6ee7b7; font-size: 13px; margin-bottom: 15px;
        }
        .success-message.show { display: block; }
        
        .step { display: none; animation: fadeIn 0.3s ease-in-out; }
        .step.active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .login-box { grid-template-columns: 1fr; }
            .login-image-section { display: none; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-form-section">
                <div class="form-title">Account Recovery</div>
                <div class="form-subtitle" id="stepSubtitle">Enter your phone number to receive a verification code</div>

                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>

                <!-- STEP 1: PHONE PHASE -->
                <div id="step-phone" class="step active">
                    <form id="phoneForm">
                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" class="normal-text" id="phone" placeholder="017xxxxxxxx" required />
                        </div>
                        <button type="submit" class="login-btn" id="sendCodeBtn">Send Verification Code</button>
                    </form>
                    <div style="text-align: center; margin-top: 25px;">
                        <a href="login.html" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px;">← Back to login</a>
                    </div>
                </div>

                <!-- STEP 2: CODE PHASE -->
                <div id="step-verify" class="step">
                    <form id="verifyForm">
                        <div class="form-group">
                            <label for="code">6-Digit Code</label>
                            <input type="text" id="code" placeholder="------" maxlength="6" required />
                        </div>
                        <button type="submit" class="login-btn" id="verifyCodeBtn">Verify Code</button>
                    </form>
                    <div style="text-align: center; margin-top: 25px;">
                        <a href="#" onclick="showStep('step-phone')" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px;">Use a different phone number</a>
                    </div>
                </div>

                <!-- STEP 3: DECISION PHASE -->
                <div id="step-decision" class="step">
                    <p style="margin-bottom: 20px; font-size: 15px; text-align: center;">Verification successful! Do you want to change your password now?</p>
                    <button type="button" class="login-btn" onclick="showStep('step-password')">Yes, Update Password</button>
                    <button type="button" class="secondary-btn" onclick="window.location.href='index.html'">Not Now, Login</button>
                </div>

                <!-- STEP 4: PASSWORD PHASE -->
                <div id="step-password" class="step">
                    <form id="passwordForm">
                        <div class="form-group">
                            <label for="new_password">New Password</label>
                            <input type="password" class="normal-text" id="new_password" placeholder="••••••••" required />
                        </div>
                        <button type="submit" class="login-btn" id="resetBtn">Save Password</button>
                    </form>
                </div>

            </div>

            <div class="login-image-section"></div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let currentPhone = '';

        function showError(msg) {
            document.getElementById('errorMessage').textContent = msg;
            document.getElementById('errorMessage').classList.add('show');
            document.getElementById('successMessage').classList.remove('show');
            setTimeout(() => document.getElementById('errorMessage').classList.remove('show'), 4000);
        }

        function showSuccess(msg) {
            document.getElementById('successMessage').textContent = msg;
            document.getElementById('successMessage').classList.add('show');
            document.getElementById('errorMessage').classList.remove('show');
        }

        function showStep(stepId) {
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById(stepId).classList.add('active');
            
            const subtitle = document.getElementById('stepSubtitle');
            if (stepId === 'step-phone') subtitle.textContent = "Enter your phone number to receive a verification code";
            else if (stepId === 'step-verify') subtitle.textContent = "Check your phone (or server console) for the code";
            else if (stepId === 'step-decision') subtitle.textContent = "Choose your next action";
            else if (stepId === 'step-password') subtitle.textContent = "Create a new strong password";
        }

        // 1. Send Phone Code
        document.getElementById('phoneForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone').value.trim();
            const btn = document.getElementById('sendCodeBtn');
            currentPhone = phone;
            
            btn.disabled = true; btn.textContent = 'Sending...';
            try {
                const res = await fetch(`${API_URL}/auth/forgot-password`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone })
                });
                const data = await res.json();
                if(!res.ok) throw new Error(data.error || 'Failed to send code');
                
                showSuccess('Verification code sent! (Check the server terminal window)');
                showStep('step-verify');
            } catch (err) {
                showError(err.message);
            } finally {
                btn.disabled = false; btn.textContent = 'Send Verification Code';
            }
        });

        // 2. Verify Code
        document.getElementById('verifyForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const code = document.getElementById('code').value.trim();
            const btn = document.getElementById('verifyCodeBtn');
            
            btn.disabled = true; btn.textContent = 'Verifying...';
            try {
                const res = await fetch(`${API_URL}/auth/verify-code`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: currentPhone, code })
                });
                const data = await res.json();
                if(!res.ok) {
                    showError(data.error || 'Invalid code');
                    showStep('step-phone'); // if user enters wrong code repeatedly, we force restart (as requested)
                    return;
                }
                
                // Keep login token active
                localStorage.setItem('user', JSON.stringify(data.user));
                localStorage.setItem('token', data.token);
                
                showStep('step-decision');
            } catch (err) {
                showError('Network error');
            } finally {
                btn.disabled = false; btn.textContent = 'Verify Code';
            }
        });

        // 3. Reset Password
        document.getElementById('passwordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const new_password = document.getElementById('new_password').value;
            const btn = document.getElementById('resetBtn');
            const token = localStorage.getItem('token');
            
            btn.disabled = true; btn.textContent = 'Saving...';
            try {
                const res = await fetch(`${API_URL}/auth/reset-password`, {
                    method: 'POST', 
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ new_password })
                });
                const data = await res.json();
                if(!res.ok) throw new Error(data.error || 'Failed to update');
                
                showSuccess('Password updated successfully! Redirecting...');
                setTimeout(() => window.location.href = 'index.html', 1500);
            } catch (err) {
                showError(err.message);
                btn.disabled = false; btn.textContent = 'Save Password';
            }
        });
    </script>
</body>
</html>
